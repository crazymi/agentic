[project]
name = "agentic"
package_manager = "uv"
venv = ".venv"

[paths]
model_dir = "models"
prompt_dir = "prompts"
trace_dir = "traces"

[prompts]
master = "prompts/master_phase1.md"
subagent = "prompts/subagent_phase1.md"
tool_call_grammar = "prompts/tool_call_grammar.md"

[runtime]
default_master_model = "master-gemma-q4"
default_subagent_model = "subagent-diffusiongemma-q4"
trace_file = "traces/phase1.jsonl"

[models.master-gemma-q4]
role = "master"
name = "gemma-4-26B-A4B-it-UD-Q4_K_XL"
model_path = "models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"
executable = "runtimes/llama.cpp/build-cuda/bin/llama-completion"
args = ["-ngl", "99", "-c", "1024", "-b", "128", "-ub", "128", "--jinja", "--single-turn", "--reasoning", "off", "--reasoning-budget", "0", "--no-display-prompt", "--no-warmup"]
system_prompt_file = "prompts/master_phase1.md"
prompt_via_stdin = false
max_tokens = 64
timeout_s = 600

[models.master-gemma-iq2]
role = "master"
name = "gemma-4-26B-A4B-it-UD-IQ2_XXS"
model_path = "models/gemma-4-26B-A4B-it-UD-IQ2_XXS.gguf"
executable = "runtimes/llama.cpp/build-cuda/bin/llama-completion"
args = ["-ngl", "99", "-c", "1024", "-b", "128", "-ub", "128", "--jinja", "--single-turn", "--reasoning", "off", "--reasoning-budget", "0", "--no-display-prompt", "--no-warmup"]
system_prompt_file = "prompts/master_phase1.md"
prompt_via_stdin = false
max_tokens = 64
timeout_s = 600

[models.subagent-diffusiongemma-q4]
role = "subagent"
name = "diffusiongemma-26B-A4B-it-Q4_K_M"
model_path = "models/diffusiongemma-26B-A4B-it-Q4_K_M.gguf"
executable = "runtimes/llama.cpp/build-cuda/bin/llama-diffusion-cli"
args = ["-ngl", "99", "-c", "512", "-b", "128", "-ub", "128", "--diffusion-eb-max-steps", "16"]
system_prompt_file = "prompts/subagent_phase1.md"
prompt_via_stdin = false
max_tokens = 16
timeout_s = 600
